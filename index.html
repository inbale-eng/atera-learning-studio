<script type="text/x-dc" data-dc-script>
class Component extends DCLogic {
  state = {
    view: 'dashboard',
    library: this.seedLibrary(),
    editingId: null,
    currentLessonIdx: 0,
    selectedBlockId: null,
    drawerId: null,
    popover: null,
    fontMenu: null,
    libraryOpen: false,
    insertAt: null,
    modal: null,
    newKind: 'course',
    newTitle: '',
    newFolderId: null,
    folders: this.seedFolders(),
    team: this.seedTeam(),
    teamModal: null,
    dashPage: 'content',
    activeFolder: null,
    expandedFolders: {},
    folderModal: null,
    itemMenu: null,
    exportOpts: { format:'scorm12', tracking:'completion', completionPct:100, reporting:'passed_incomplete', exitLink:false, hideCover:true },
    exportMenu: null,
    learn: {},
    learnerLessonIdx: 0,
    completed: {},
    toast: null,
    drag: null,
    dashView: 'grid',
    dashSort: 'new',
    dashKind: 'all',
    changes: [],
    redo: [],
    advOpen: false,
    pathNodeId: null,
    pathProg: {},
    pathSel: null,
    pathAdd: false,
  };

  /* ============================== utils ============================== */
  uid(){ return 'x' + Math.random().toString(36).slice(2, 9); }
  h(){ return React.createElement.apply(null, arguments); }
  now(){ return 'Jul 13, 2026'; }

  mutate(fn, desc, key){
    const before = this.snapshot();
    const lib = structuredClone(this.state.library); fn(lib);
    const d = desc ? { desc, key: key||null } : this.describeLibDiff(before.library, lib);
    this.setState({ library: lib, dirty: true });
    if(d) this.logChange(d.desc, d.key, before);
    this.scheduleLocalSave();
  }

  /* ===== change log — unsaved-changes tracking, undo/redo, copy-for-Claude ===== */
  snapshot(){ return { library: structuredClone(this.state.library), folders: structuredClone(this.state.folders) }; }
  logChange(desc, key, before){
    this.setState(s=>{
      const changes = (s.changes||[]).slice();
      const last = changes[changes.length-1];
      if(last && key && last.key === key && !last.copied && (Date.now()-last.ts) < 300000){
        changes[changes.length-1] = Object.assign({}, last, { desc, ts: Date.now() });
      } else {
        changes.push({ id: this.uid(), desc, key: key||null, ts: Date.now(), before, copied:false });
        if(changes.length > 40) changes.splice(0, changes.length-40);
      }
      return { changes, redo: [] };
    });
  }
  undoChange(){
    const cs = this.state.changes||[]; if(!cs.length) return;
    const e = cs[cs.length-1];
    const after = this.snapshot();
    this.setState({ library: structuredClone(e.before.library), folders: structuredClone(e.before.folders), changes: cs.slice(0,-1), redo: [...(this.state.redo||[]), Object.assign({}, e, { after })], dirty: cs.length > 1 || !!(this._base && JSON.stringify(e.before.library) !== JSON.stringify(this._base.library)) });
    this.scheduleLocalSave();
  }
  redoChange(){
    const rs = this.state.redo||[]; if(!rs.length) return;
    const e = rs[rs.length-1];
    this.setState({ library: structuredClone(e.after.library), folders: structuredClone(e.after.folders), redo: rs.slice(0,-1), changes: [...(this.state.changes||[]), e], dirty: true });
    this.scheduleLocalSave();
  }
  discardChanges(){
    if(!confirm('Discard all unsaved changes and revert to the last saved version?')) return;
    const base = this._base || (((this.state.changes||[])[0]||{}).before);
    if(base) this.setState({ library: structuredClone(base.library), folders: structuredClone(base.folders), changes: [], redo: [], dirty:false, modal:null });
    else this.setState({ changes: [], redo: [], dirty:false, modal:null });
    this.scheduleLocalSave(); this.toast('Changes discarded');
  }
  timeAgo(ts){ const s=Math.max(0,(Date.now()-ts)/1000); if(s<60) return 'just now'; const m=Math.floor(s/60); if(m<60) return m+'m ago'; const h=Math.floor(m/60); if(h<24) return h+'h ago'; return Math.floor(h/24)+'d ago'; }
  copyChanges(){
    const cs = this.state.changes||[];
    const lines = cs.length ? cs.map(c=>'- '+c.desc) : ['- (edits made before change tracking — see JSON)'];
    const payload = 'Learning Studio — please bake my unsaved changes into the shared content file learning-studio-v3.state.json by replacing its contents with the JSON below.\n\nChange log:\n'+lines.join('\n')+'\n\nNew state JSON:\n```json\n'+JSON.stringify({ version:1, savedAt: Date.now(), library: this.state.library, folders: this.state.folders })+'\n```';
    const done = ()=>{ this.setState(s=>({ changes:(s.changes||[]).map(c=>Object.assign({},c,{copied:true})) })); this.scheduleLocalSave(); this.toast('Copied — paste it to Claude in the project chat'); };
    try{ navigator.clipboard.writeText(payload).then(done, ()=>this.fallbackCopy(payload, done)); }catch(e){ this.fallbackCopy(payload, done); }
  }
  fallbackCopy(text, done){ const t=document.createElement('textarea'); t.value=text; t.style.position='fixed'; t.style.opacity=0; document.body.appendChild(t); t.select(); try{ document.execCommand('copy'); done(); }catch(e){ this.toast('Copy failed — try again'); } t.remove(); }
  describeLibDiff(a, b){
    const short=(s,n)=>{ s=String(s==null?'':s).replace(/\s+/g,' ').trim(); n=n||42; return s.length>n ? s.slice(0,n-1)+'…' : s; };
    const J=JSON.stringify;
    const mapBy=arr=>{ const m={}; (arr||[]).forEach(x=>{ if(x&&x.id) m[x.id]=x; }); return m; };
    const am=mapBy(a), bm=mapBy(b);
    for(const id in bm) if(!am[id]) return { key:'i+'+id, desc:(bm[id].kind==='course'?'Course':'Lesson')+' "'+short(bm[id].title)+'" created' };
    for(const id in am) if(!bm[id]) return { key:'i-'+id, desc:(am[id].kind==='course'?'Course':'Lesson')+' "'+short(am[id].title)+'" deleted' };
    for(const id in bm){
      const A=am[id], B=bm[id];
      if(J(A)===J(B)) continue;
      const t=short(B.title,30);
      if(A.title!==B.title) return { key:id+':title', desc:'"'+short(A.title,30)+'" renamed to "'+short(B.title)+'"' };
      if(A.description!==B.description) return { key:id+':description', desc:t+' · description edited' };
      if(A.cover!==B.cover) return { key:id+':cover', desc:t+' · cover changed' };
      if((A.folderId||null)!==(B.folderId||null)){ const f=this.folderById(B.folderId); return { key:id+':folder', desc:t+' · moved to '+(f?('folder "'+short(f.name,24)+'"'):'All content') }; }
      const la=mapBy(A.lessons), lb=mapBy(B.lessons);
      for(const lid in lb) if(!la[lid]) return { key:id+':l+'+lid, desc:t+' · lesson "'+short(lb[lid].title,28)+'" added' };
      for(const lid in la) if(!lb[lid]) return { key:id+':l-'+lid, desc:t+' · lesson "'+short(la[lid].title,28)+'" deleted' };
      for(const lid in lb){
        const LA=la[lid], LB=lb[lid];
        if(J(LA)===J(LB)) continue;
        const lt=t+' · '+short(LB.title,24);
        if(LA.title!==LB.title) return { key:id+':'+lid+':title', desc:t+' · lesson renamed to "'+short(LB.title,28)+'"' };
        const ba=mapBy(LA.blocks), bb=mapBy(LB.blocks);
        for(const bid in bb) if(!ba[bid]) return { key:id+':'+lid+':b+'+bid, desc:lt+' · '+bb[bid].type+' block added' };
        for(const bid in ba) if(!bb[bid]) return { key:id+':'+lid+':b-'+bid, desc:lt+' · '+ba[bid].type+' block deleted' };
        for(const bid in bb){
          const BA=ba[bid], BB=bb[bid];
          if(J(BA)===J(BB)) continue;
          const ks=Object.keys(Object.assign({},BA,BB));
          for(const k of ks){ if(k==='id') continue;
            if(J(BA[k])!==J(BB[k])){
              const v=(typeof BB[k]==='string') ? (' → "'+short(BB[k])+'"') : ' edited';
              return { key:id+':'+lid+':'+bid+':'+k, desc:lt+' · '+BB.type+' '+k+v };
            }
          }
          return { key:id+':'+lid+':'+bid, desc:lt+' · '+BB.type+' block edited' };
        }
        if((LA.blocks||[]).map(x=>x.id).join()!==(LB.blocks||[]).map(x=>x.id).join()) return { key:id+':'+lid+':order', desc:lt+' · blocks reordered' };
        const lk=Object.keys(Object.assign({},LA,LB)).filter(k=>k!=='id'&&k!=='title'&&k!=='blocks');
        for(const k of lk) if(J(LA[k])!==J(LB[k])) return { key:id+':'+lid+':'+k, desc:lt+' · '+k+' changed' };
        return { key:id+':'+lid, desc:lt+' · lesson edited' };
      }
      if((A.lessons||[]).map(x=>x.id).join()!==(B.lessons||[]).map(x=>x.id).join()) return { key:id+':lorder', desc:t+' · lessons reordered' };
      const ik=Object.keys(Object.assign({},A,B)).filter(k=>['id','title','description','cover','folderId','lessons','updated'].indexOf(k)===-1);
      for(const k of ik) if(J(A[k])!==J(B[k])) return { key:id+':'+k, desc:t+' · '+k+' changed' };
      if(J(Object.assign({},A,{updated:0}))===J(Object.assign({},B,{updated:0}))) continue;
      return { key:id, desc:t+' · edited' };
    }
    if((a||[]).map(x=>x.id).join()!==(b||[]).map(x=>x.id).join()) return { key:'order', desc:'Library reordered' };
    return null;
  }
  stateFile(){ return 'learning-studio-v3.state.json'; }

  /* ===== Supabase (shared database) — paste your project's URL + anon key ===== */
  SUPABASE_URL = 'https://redltybyxhkusazafwbi.supabase.co';
  SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InJlZGx0eWJ5eGhrdXNhemFmd2JpIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODQwMzE3ODMsImV4cCI6MjA5OTYwNzc4M30.pLKXX85AIsbHe_4KRdZKnSqloJ95JEHJdbKALrUKsdI';
  sbRowId(){ return 'learning-studio-v3'; }
  sb(){ return (this.SUPABASE_URL && this.SUPABASE_ANON_KEY) ? { url:this.SUPABASE_URL.replace(/\/$/,''), key:this.SUPABASE_ANON_KEY } : null; }
  sbHeaders(extra){ const c=this.sb(); return Object.assign({ apikey:c.key, Authorization:'Bearer '+c.key, 'Content-Type':'application/json' }, extra||{}); }
  async sbLoad(){ const c=this.sb(); if(!c) return null;
    const r = await fetch(`${c.url}/rest/v1/app_state?id=eq.${this.sbRowId()}&select=data,updated_at`, { headers:this.sbHeaders(), cache:'no-store' });
    if(!r.ok) throw new Error('load '+r.status);
    const rows = await r.json(); if(!rows || !rows.length) return null;
    const d = rows[0].data || {};
    if(!Array.isArray(d.library)) return null;
    return { library:d.library, folders:Array.isArray(d.folders)?d.folders:[], team:Array.isArray(d.team)?d.team:null, savedAt: Date.parse(rows[0].updated_at)||Date.now() };
  }
  async sbSave(payload){ const c=this.sb(); if(!c) throw new Error('not configured');
    const body = [{ id:this.sbRowId(), data:{ version:1, library:payload.library, folders:payload.folders, team:payload.team }, updated_at:new Date().toISOString() }];
    const r = await fetch(`${c.url}/rest/v1/app_state?on_conflict=id`, { method:'POST', headers:this.sbHeaders({ Prefer:'resolution=merge-duplicates,return=minimal' }), body:JSON.stringify(body) });
    if(!r.ok) throw new Error('save '+r.status);
  }
  editable(){ return !!(window.omelette && window.omelette.writeFile); }
  draftKey(){ return 'learning-studio.draft.v3'; }
  scheduleLocalSave(){ clearTimeout(this._ls); this._ls = setTimeout(()=>this.saveLocal(), 350); }
  saveLocal(lib){ try{ localStorage.setItem(this.draftKey(), JSON.stringify({ savedAt: Date.now(), library: lib || this.state.library, folders: this.state.folders, team: this.state.team, changes: this.state.changes || [], base: this._base || null })); }catch(e){ if(!this._lsWarned || Date.now()-this._lsWarned>60000){ this._lsWarned=Date.now(); this.toast('Draft too large to auto-save locally — click Save to keep your changes'); } } }
  componentDidMount(){
    try{ let l=document.querySelector('link[rel="icon"]'); if(!l){ l=document.createElement('link'); l.rel='icon'; document.head.appendChild(l); } l.type='image/png'; l.href='assets/learning-studio-favicon.png'; }catch(e){}
    this._rs = ()=>{ clearTimeout(this._rst); this._rst = setTimeout(()=>this.setState({ winW:window.innerWidth }), 120); };
    window.addEventListener('resize', this._rs);
    this.loadState(); this._poll = setInterval(()=>this.pollState(), 10000); this._slash = (e)=>{ if(e.key!=='/' || this.state.view!=='editor' || this.state.insertMenu) return; const a=document.activeElement; if(a && (a.tagName==='INPUT' || a.tagName==='TEXTAREA' || a.isContentEditable)) return; e.preventDefault(); const it=this.curItem(); const l=it && it.lessons[this.state.currentLessonIdx]; if(l) this.openInsertMenu(l.blocks.length); }; document.addEventListener('keydown', this._slash); }
  componentWillUnmount(){ if(this._poll) clearInterval(this._poll); if(this._slash) document.removeEventListener('keydown', this._slash); if(this._rs) window.removeEventListener('resize', this._rs); }
  winW(){ return this.state.winW || window.innerWidth; }
  mob(){ return this.winW() < 820; }
  narrow(){ return this.winW() < 1080; }

  async loadState(){
    let remote = null;
    const cfg = this.sb();
    if(cfg){
      try{ const d = await this.sbLoad(); if(d) remote = d; this._sbOk = true; }
      catch(e){ this._sbOk = false; }
    } else {
      try{ const r = await fetch(this.stateFile()+'?t='+Date.now()); if(r.ok){ const j = await r.json(); if(j && Array.isArray(j.library) && j.library.length){ remote = j; } } }catch(e){}
    }
    let local = null;
    try{ const d = localStorage.getItem(this.draftKey()); if(d){ const j = JSON.parse(d); if(j && Array.isArray(j.library) && j.library.length){ local = j; } } }catch(e){}
    this._loaded = true;
    const rt = (remote && remote.savedAt) || 0, lt = (local && local.savedAt) || 0;
    // localStorage is the durable copy on this device; it survives a refresh even if the shared file didn't persist.
    // Use whichever is newer so a teammate's newer save still wins, but we never silently lose local work.
    if(local && (!remote || lt >= rt)){
      this._lastRaw = remote ? JSON.stringify(remote.library) : this._lastRaw;
      const changed = !remote || JSON.stringify(local.library) !== JSON.stringify(remote.library);
      this._base = local.base || (remote ? { library: structuredClone(remote.library), folders: structuredClone(remote.folders||[]) } : null);
      this.setState({ library: local.library, folders: Array.isArray(local.folders)?local.folders:this.state.folders, team: (Array.isArray(local.team)&&local.team.length)?local.team:this.state.team, changes: Array.isArray(local.changes)?local.changes:[], dirty: changed });
      if(changed && remote) this.toast('Restored your latest changes');
    } else if(remote){
      this._lastRaw = JSON.stringify(remote.library);
      this._base = { library: structuredClone(remote.library), folders: structuredClone(remote.folders||[]) };
      this.setState({ library: remote.library, folders: Array.isArray(remote.folders)?remote.folders:this.state.folders, team: (Array.isArray(remote.team)&&remote.team.length)?remote.team:this.state.team, changes: [], redo: [], dirty:false });
      try{ localStorage.setItem(this.draftKey(), JSON.stringify({ savedAt: rt || Date.now(), library: remote.library, folders: remote.folders||this.state.folders })); }catch(e){}
    }
    if(!this._base) this._base = { library: structuredClone(this.state.library), folders: structuredClone(this.state.folders) };
  }
  async pollState(){ if(this.state.dirty || this.state.view !== 'dashboard') return;
    const cfg = this.sb();
    if(cfg){ try{ const d = await this.sbLoad(); if(d && Array.isArray(d.library)){ const raw = JSON.stringify(d.library); if(this._lastRaw && raw !== this._lastRaw){ this._lastRaw = raw; this.setState({ library:d.library, folders:d.folders }); this.saveLocal(d.library); this.toast('Content updated by a collaborator'); } else { this._lastRaw = raw; } } }catch(e){} return; }
    try{ const r = await fetch(this.stateFile()+'?t='+Date.now()); if(!r.ok) return; const j = await r.json(); if(j && Array.isArray(j.library)){ const raw = JSON.stringify(j.library); if(this._lastRaw && raw !== this._lastRaw){ this._lastRaw = raw; this.setState({ library: j.library }); this.toast('Content updated by a collaborator'); } else { this._lastRaw = raw; } } }catch(e){} }
  save(){ if(!this._loaded){ this.toast('Still loading your content — one moment'); return; } if(this.state.saving) return; const ts = Date.now(); const lib = this.state.library; this._lastRaw = JSON.stringify(lib);
    // Always keep a durable copy on this device.
    this.saveLocal(lib);
    const done = (msg)=>{ this._base = { library: structuredClone(lib), folders: structuredClone(this.state.folders) }; this.setState({ dirty:false, saving:false, changes:[], redo:[] }); this.scheduleLocalSave(); this.toast(msg); };
    const payload = { version:1, savedAt:ts, library:lib, folders:this.state.folders, team:this.state.team };
    const cfg = this.sb();
    if(cfg){ this.setState({ saving:true }); this.sbSave(payload).then(()=>done('Saved to the shared database — everyone sees the latest')).catch(()=>{ this.setState({ saving:false }); this.toast('Saved on this device — database save failed, try again'); }); return; }
    const w = window.omelette && window.omelette.writeFile;
    if(!w){ done('Saved on this device'); return; }
    this.setState({ saving:true }); const fp = JSON.stringify(payload);
    try{ Promise.resolve(w(this.stateFile(), fp)).then(()=>done('Saved — everyone with access will see the latest')).catch(()=>{ this.setState({ saving:false }); this.toast('Saved on this device — sharing failed, try again'); }); }catch(e){ this.setState({ saving:false }); this.toast('Saved on this device'); } }
  curItem(){ return this.state.library.find(i => i.id === this.state.editingId); }
  withItem(fn){ this.mutate(lib => { const it = lib.find(i => i.id === this.state.editingId); if (it) fn(it); }); }
  withLesson(fn){ this.withItem(it => { const l = it.lessons[this.state.currentLessonIdx]; if (l) fn(l, it); }); }
  patchBlock(bid, patch){ this.withLesson(l => { const b = l.blocks.find(x => x.id === bid); if (b) Object.assign(b, patch); }); }
  editBlock(bid, fn){ this.withLesson(l => { const b = l.blocks.find(x => x.id === bid); if (b) fn(b); }); }

  toast(msg){ this.setState({ toast: msg }); clearTimeout(this._tt); this._tt = setTimeout(() => this.setState({ toast: null }), 2600); }

  lget(bid){ return this.state.learn[bid] || {}; }
  lset(bid, patch){ this.setState(s => ({ learn: { ...s.learn, [bid]: { ...s.learn[bid], ...patch } } })); }

  /* ============================== seed ============================== */
  covers(){
    return {
      brand:  { bg: 'linear-gradient(150deg,#b7768a 0%,#7c4d5e 100%)' },
      violet: { bg: 'linear-gradient(150deg,#7f719c 0%,#4d4463 100%)' },
      blue:   { bg: 'linear-gradient(150deg,#5e7194 0%,#39415a 100%)' },
      green:  { bg: 'linear-gradient(150deg,#6d8a74 0%,#41564a 100%)' },
      slate:  { bg: 'linear-gradient(150deg,#8c8478 0%,#4b473f 100%)' },
      dark:   { bg: 'linear-gradient(150deg,#2a2531 0%,#141019 100%)', accent:'#8f7fae' },
    };
  }
  flatCover(key){
    return {
      brand:{ bg:'#eceff4', ic:'#6b7688' }, blue:{ bg:'#e9f2ff', ic:'#0055cc' }, violet:{ bg:'#f9ecff', ic:'#a851cd' },
      green:{ bg:'#e8f0e9', ic:'#5c7a63' }, slate:{ bg:'#f4f1ec', ic:'#8a7f6d' }, dark:{ bg:'#1a1a1a', ic:'#8f8f8f' },

  /* ---- folder helpers ---- */
  childFolders(parentId){ return this.state.folders.filter(f => (f.parentId||null) === (parentId||null)); }
  folderById(id){ return this.state.folders.find(f => f.id === id) || null; }
  folderDepth(id){ let d=0, f=this.folderById(id); while(f && f.parentId){ d++; f=this.folderById(f.parentId); } return d; }
  folderPath(id){ const out=[]; let f=this.folderById(id); while(f){ out.unshift(f); f=f.parentId?this.folderById(f.parentId):null; } return out; }
  itemsInFolder(id){ return this.state.library.filter(it => (it.folderId||null) === (id||null)); }
  descendantIds(id){ const acc=[id]; const walk=(pid)=>{ this.childFolders(pid).forEach(c=>{ acc.push(c.id); walk(c.id); }); }; walk(id); return acc; }
  folderItemCount(id){ const ids = this.descendantIds(id); return this.state.library.filter(it => ids.includes(it.folderId)).length; }
  createFolder(name, parentId){
    const f = { id:this.uid(), name:(name||'').trim()||'New folder', parentId: parentId||null };
    const _before = this.snapshot();
    this.setState(s=>({ folders:[...s.folders, f], dirty:true, expandedFolders: parentId?{...s.expandedFolders, [parentId]:true}:s.expandedFolders, folderModal:null }));
    this.logChange('Folder "'+f.name+'" created', null, _before);
    this.scheduleLocalSave();
    return f.id;
  }
  renameFolder(id, name){ const _old=(this.folderById(id)||{}).name; const _before=this.snapshot(); this.setState(s=>({ folders:s.folders.map(f=>f.id===id?{...f, name:(name||'').trim()||f.name}:f), dirty:true, folderModal:null })); this.logChange('Folder "'+_old+'" renamed to "'+((name||'').trim()||_old)+'"', null, _before); this.scheduleLocalSave(); }
  deleteFolder(id){
    const ids = this.descendantIds(id);
    const _fname = (this.folderById(id)||{}).name || 'folder';
    const _before = this.snapshot();
    this.setState(s=>({
      folders: s.folders.filter(f=>!ids.includes(f.id)),
      library: s.library.map(it=> ids.includes(it.folderId) ? { ...it, folderId:null } : it),
      activeFolder: ids.includes(s.activeFolder) ? null : s.activeFolder,
      dirty:true,
    }));
    this.logChange('Folder "'+_fname+'" deleted', null, _before);
    this.scheduleLocalSave();
  }
  moveItemToFolder(itemId, folderId){ this.mutate(lib=>{ const it=lib.find(i=>i.id===itemId); if(it) it.folderId = folderId||null; }); }
  deleteItem(id){ const it=this.state.library.find(i=>i.id===id); if(!it) return; if(!confirm('Delete “'+it.title+'”? This cannot be undone.')) return; const _before=this.snapshot(); this.setState(s=>({ library:s.library.filter(i=>i.id!==id), itemMenu:null, dirty:true })); this.logChange((it.kind==='course'?'Course':'Lesson')+' "'+it.title+'" deleted', null, _before); this.scheduleLocalSave(); this.toast('Deleted “'+it.title+'”'); }
  duplicateItem(id){ const it=this.state.library.find(i=>i.id===id); if(!it) return; const _before=this.snapshot(); const copy=structuredClone(it); copy.id=this.uid(); copy.title=it.title+' (copy)'; copy.updated=this.now(); const reid=(o)=>{ if(o&&typeof o==='object'){ if(o.blocks) o.blocks.forEach(b=>b.id=this.uid()); } }; if(copy.lessons) copy.lessons.forEach(l=>{ l.id=this.uid(); reid(l); }); this.setState(s=>{ const i=s.library.findIndex(x=>x.id===id); const lib=[...s.library]; lib.splice(i+1,0,copy); return { library:lib, itemMenu:null, dirty:true }; }); this.logChange('"'+it.title+'" duplicated', null, _before); this.scheduleLocalSave(); this.toast('Duplicated'); }

  async loadPdfJs(){
    if(window.pdfjsLib) return window.pdfjsLib;
    await new Promise((res, rej)=>{ const s=document.createElement('script'); s.src='https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js'; s.onload=res; s.onerror=rej; document.head.appendChild(s); });

    return window.pdfjsLib;

  async extractPdfText(file){
    const pdfjs = await this.loadPdfJs();
    const buf = await file.arrayBuffer();
    const doc = await pdfjs.getDocument({ data:buf }).promise;
    const n = Math.min(doc.numPages, 80);
    const out = [];
    for(let i=1;i<=n;i++){ const p=await doc.getPage(i); const tc=await p.getTextContent(); out.push(tc.items.map(it=>it.str).join(' ')); }

  }
  async renderPdfPages(file, maxPages, scale, quality){
    const pdfjs = await this.loadPdfJs();
    const buf = await file.arrayBuffer();
    const doc = await pdfjs.getDocument({ data:buf }).promise;
    const n = Math.min(doc.numPages, maxPages||20);
    const out = [];
    for(let i=1;i<=n;i++){
      const p = await doc.getPage(i);
      const vp = p.getViewport({ scale: scale||1.4 });
      const c = document.createElement('canvas'); c.width = vp.width; c.height = vp.height;
      await p.render({ canvasContext:c.getContext('2d'), viewport:vp }).promise;
      out.push(c.toDataURL('image/jpeg', quality||.82));
      this.setState({ aiStage:'Rendering pages & screenshots ('+i+'/'+n+')…' });
    }
    return out;
  }
  shrinkDataUrl(dataUrl, maxW, quality){

  async attachAIImages(j){

  trimUniformMargins(ctx, w, h){

      const rowBg = (yy)=>{ let n=0, s=0; for(let xx=0; xx<w; xx+=2){ s++; if(isBg((yy*w+xx)*4)) n++; } return n/s > .985; };
      const colBg = (xx)=>{ let n=0, s=0; for(let yy=0; yy<h; yy+=2){ s++; if(isBg((yy*w+xx)*4)) n++; } return n/s > .985; };

      while(top<bot && rowBg(top)) top++;

<manifest identifier="${id}" version="1.2" xmlns="http://www.imsproject.org/xsd/imscp_rootv1p1p2" xmlns:adlcp="http://www.adlnet.org/xsd/adlcp_rootv1p2" xmlns:xsi="http://www.w3.org/2001/XMLSchema-instance" xsi:schemaLocation="http://www.imsproject.org/xsd/imscp_rootv1p1p2 imscp_rootv1p1p2.xsd http://www.adlnet.org/xsd/adlcp_rootv1p2 adlcp_rootv1p2.xsd">

  <organizations default="ORG">

  }
  crcTable(){ if(this._crc) return this._crc; const t=[]; for(let n=0;n<256;n++){ let c=n; for(let k=0;k<8;k++) c = c&1 ? 0xEDB88320 ^ (c>>>1) : c>>>1; t[n]=c>>>0; } return this._crc=t; }

  zip(files){

    const u16=n=>[n&255,(n>>8)&255]; const u32=n=>[n&255,(n>>8)&255,(n>>16)&255,(n>>24)&255];
    for(const f of files){ const data = typeof f.content==='string' ? enc.encode(f.content) : f.content; const crc=this.crc32(data); const name=enc.encode(f.name);
      const local=[].concat(u32(0x04034b50),u16(20),u16(0),u16(0),u16(0),u16(0),u32(crc),u32(data.length),u32(data.length),u16(name.length),u16(0));

      const cen=[].concat(u32(0x02014b50),u16(20),u16(20),u16(0),u16(0),u16(0),u16(0),u32(crc),u32(data.length),u32(data.length),u16(name.length),u16(0),u16(0),u16(0),u16(0),u32(0),u32(offset));
      central.push(new Uint8Array(cen), name);
      offset += local.length + name.length + data.length;
    }
    let cenSize=0; central.forEach(c=>cenSize+=c.length);
    const end=new Uint8Array([].concat(u32(0x06054b50),u16(0),u16(0),u16(files.length),u16(files.length),u32(cenSize),u32(offset),u16(0)));
    const all=[...chunks,...central,end]; let total=0; all.forEach(a=>total+=a.length);
    const out=new Uint8Array(total); let p=0; all.forEach(a=>{ out.set(a,p); p+=a.length; });
    return new Blob([out],{type:'application/zip'});
  }
  setExport(patch){ this.setState(s=>({ exportOpts:{ ...s.exportOpts, ...patch } })); }

  renderExportModal(){

  async exportScorm(opts){
    const it=this.curItem(); if(!it) return;
    opts = opts || this.state.exportOpts;
    const files=[ { name:'imsmanifest.xml', content:this.buildManifest(it,opts) }, { name:'index.html', content: it.kind==='path' ? this.buildPathIndexHtml(it,opts) : this.buildIndexHtml(it,opts) } ];
    const pkgs=[]; (it.lessons||[]).forEach(l=>(l.blocks||[]).forEach(b=>{ if(b.type==='scormpkg' && b.data) pkgs.push(b); }));
    if(it.kind==='path'){ (it.nodes||[]).forEach(n=>{ const c=this.state.library.find(x=>x.id===n.courseId); if(c) (c.lessons||[]).forEach(l=>(l.blocks||[]).forEach(b=>{ if(b.type==='scormpkg' && b.data) pkgs.push(b); })); }); }
    for(const b of pkgs){
      try{
        await this._ensureScript('https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js');
        const zip = await window.JSZip.loadAsync(b.data, { base64:true });
        const jobs=[]; zip.forEach((p,f)=>{ if(!f.dir) jobs.push(f.async('uint8array').then(u=>{ files.push({ name:'pkg_'+b.id+'/'+p, content:u }); })); });
        await Promise.all(jobs);
      }catch(err){ this.toast('Skipped package '+(b.name||'')+': '+(err.message||err)); }
    }
    const blob=this.zip(files);
    const tag = opts.format==='scorm2004' ? 'scorm2004' : 'scorm12';
    const a=document.createElement('a'); a.href=URL.createObjectURL(blob);
    a.download=(it.title||'course').replace(/[^\w-]+/g,'_').toLowerCase()+'_'+tag+'.zip';
    document.body.appendChild(a); a.click(); setTimeout(()=>{ URL.revokeObjectURL(a.href); a.remove(); },100);
    this.setState({ modal:null });
    this.toast('SCORM package exported');
  }
